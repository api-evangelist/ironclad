    Exposes /authorize, /token, /userinfo, and /company-info; scopes follow the `public.{resource}.{action}`
    convention (e.g., `public.workflows.readWorkflows`, `public.records.createRecords`).
- aid: ironclad:ironclad-scim-api
  name: Ironclad SCIM 2.0 API
