- type: Features
  data:
  - name: AI-Powered Contract Review
    description: Jurist agentic AI assistant reviews redlines, drafts clauses, summarizes
      contracts, and answers natural-language questions across the executed-contract
      repository.
  - name: No-Code Workflow Designer
    description: Business users design contract workflows — conditional approvals,
      signature packets, counterparty negotiation, and CRM/ERP fanout — without engineering.
  - name: Smart Import
    description: ML-driven metadata extraction that ingests legacy contract PDFs and
      predicts record metadata (counterparty, effective date, term length, renewal,
      obligations).
  - name: Repository and Records
    description: Centralized contract repository with versioned attachments, structured
      metadata, configurable schemas, and full-text + conversational search.
  - name: Webhooks
    description: Subscribe to workflow, record, and entity events for event-driven
      integration with downstream systems (CRM, ERP, ITSM, data warehouse).
  - name: Data Exports
    description: Asynchronous bulk-export jobs deliver contract metadata and content
      to a data lake or warehouse — Snowflake, BigQuery, Databricks, Redshift.
  - name: Clickwrap and Browsewrap
    description: Embed enforceable online acceptance flows (terms, EULAs, policies)
      into web, mobile, and checkout experiences with court-ready acceptance records.
  - name: Entity Management
    description: First-class counterparty and entity records linked to workflows,
      records, and obligations, with reference-type modeling.
  - name: Obligation Tracking
    description: Extract and track post-signature commitments — renewal dates, SLAs,
      payment terms, regulatory deadlines.
  - name: OAuth 2.0 and SCIM 2.0
    description: Standards-based authentication (Authorization Code + Client Credentials)
      and provisioning from any SCIM-compliant identity provider.
  - name: Regional Hosting
    description: North America (na1) and EU (eu1) hosting for data-residency compliance,
      plus a demo region for testing.
  - name: Per-Tenant Encryption
    description: Optional Hold-Your-Own-Key (HYOK) encryption via Antimatter and GCP
      for the Security & Data Pro add-on.
- type: UseCases
  data:
  - name: Sales Contract Automation
    description: Salesforce-triggered NDA, MSA, and order-form workflows that fan
      out for legal approval, counterparty signature, and CRM record update.
  - name: Procurement Lifecycle
    description: Sync vendor onboarding, intake forms, and approval gating with procurement
      systems (Workday, NetSuite, Coupa, ServiceNow).
  - name: Legal Operations
    description: Centralize matter-management, contract review queues, and clause
      libraries; offload first-pass review to Jurist AI.
  - name: HR and Employment Agreements
    description: Offer letters, NDAs, separation agreements, and contractor agreements
      with conditional-routing approvals and esignature.
  - name: Repository Migration
    description: Smart-import legacy PDF contracts into the structured Records repository
      with ML-extracted metadata.
  - name: Online Agreement Acceptance
    description: Embed clickwrap acceptance into SaaS sign-up, checkout, and policy-acknowledgement
      flows with court-ready evidence.
  - name: Compliance and Obligation Management
    description: Surface renewal dates, payment milestones, SLAs, and regulatory commitments
      from executed contracts.
  - name: AI-Augmented Repository Search
    description: Run conversational queries ("show every MSA expiring in Q3 with auto-renew")
      across the contract repository using Jurist.
- type: Integrations
  data:
  - name: Salesforce
    description: Bi-directional CRM integration — launch workflows from opportunities,
      sync record fields, update opportunity stage on contract execution.
  - name: Microsoft Word
    description: Native Word add-in for in-editor AI drafting, redlining, and clause
      comparison powered by Jurist.
  - name: Microsoft 365 / Power Automate
    description: Power Automate connector for low-code Microsoft 365 workflow orchestration.
  - name: Microsoft Dynamics 365
    description: Bi-directional contract status and document sync with Dynamics 365.
  - name: ServiceNow
    description: Procurement-process integration — request intake, approval routing,
      and contract record back-fill.
  - name: Slack
    description: Approval notifications, signature reminders, and contract-status
      messages in Slack.
  - name: HubSpot
    description: Launch contract workflows from HubSpot deals via Tray.io connector.
  - name: Jira
    description: Launch Ironclad workflows from Jira tickets and update Jira on contract
      progression (Zapier + Jira Automation patterns).
  - name: NetSuite
    description: Sync vendor contracts and obligations with NetSuite via Tray.io.
  - name: Zapier
    description: 5,000+ app connector library via Zapier for low-code automation.
  - name: MuleSoft
    description: Anypoint-Exchange connector for enterprise iPaaS integration.
  - name: Box
    description: Smart-import contracts from Box folders into the Ironclad Records
      repository.
  - name: Snowflake / BigQuery / Databricks / Redshift
    description: Event-driven and bulk data-warehouse loads via the Data Exports surface.
- type: Solutions
  data:
  - name: Ironclad CLM Platform
    description: Core contract lifecycle management — workflows, records, repository,
      AI assistant.
  - name: Jurist AI Assistant
    description: Agentic AI for contract review, redlining, drafting, summarization,
      and conversational repository search.
  - name: Ironclad Clickwrap
    description: Online-agreement acceptance and acceptance-record management for
      terms, EULAs, and checkout flows.
  - name: Security & Data Pro
    description: Per-tenant encryption (HYOK via Antimatter or GCP) and elevated data-protection
      controls for regulated industries.
  - name: Ironclad Insights
    description: Reporting, dashboards, and BI over contract metadata.
