  description: SCIM 2.0 endpoints for Just-in-Time and bulk provisioning of Ironclad
    users and groups from an upstream identity provider (Okta, Azure AD, OneLogin,
    etc.). Implements /Users, /Groups, and /Schemas with standard SCIM semantics —
    list/get/create/replace/delete plus PATCH for partial updates and group-membership
    edits. Enables SSO-aligned lifecycle management and role-based access.
