  description: The Ironclad Clickwrap (formerly PactSafe) API delivers programmatic
    clickwrap and browsewrap acceptance tracking for online agreements — terms of
    service, privacy policies, EULAs, and checkout-flow agreements. Comprises a JavaScript
    library (PS.js) for rendering and capturing acceptance events, an Activity API
    for sending acceptance/visit/displayed/agreed events server-side, and a REST API
    for managing Sites, Groups, Contracts, and Signer records. Powers in-product acceptance
    for SaaS sign-ups, checkout pages, mobile apps, and embedded forms.
name: Ironclad
description: Ironclad is the enterprise contract lifecycle management (CLM) platform
  used by legal, sales, procurement, and finance teams to draft, negotiate, approve,
  sign, store, and analyze contracts at scale. The platform combines a no-code Workflow
  Designer, AI-powered Jurist agentic assistant (contract review, redlining, drafting,
  repository search), a Records repository with smart import and metadata extraction,
  Clickwrap for online acceptance, and deep integrations with Salesforce, Microsoft
  365, Slack, Workday, ServiceNow, Jira, HubSpot, NetSuite, Dynamics 365, and Power
  Automate. Ironclad publishes three first-party OpenAPI 3.1 specifications (Public
  API, OAuth 2.0, SCIM 2.0) plus the Clickwrap REST/JS surface, supports regional
  NA1/EU1 hosting, OAuth 2.0 with scoped tokens, SCIM-based provisioning, and event-driven
  webhooks. Ironclad reported surpassing $200M in ARR in February 2026.
