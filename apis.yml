  description: The Ironclad Public API exposes contract lifecycle management primitives
    — Workflows (contract authoring, approvals, signature packets, comments, signers),
    Records (the executed contract repository with metadata, attachments, smart-import
    predictions), Entities (counterparties and parties referenced across workflows
    and records), Obligations (post-signature commitments derived from contracts),
    Webhooks (event-driven integration into downstream systems), Exports (bulk data
    warehouse pulls), and Conversational Search (Jurist-powered natural-language queries
    over the contract repository). REST/JSON over HTTPS with OAuth 2.0 (Authorization
    Code and Client Credentials) and bearer-token authentication; OpenAPI 3.1; regional
    NA1, EU1, and demo servers.
