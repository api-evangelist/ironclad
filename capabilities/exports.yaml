naftiko: 1.0.0-alpha2
info:
  label: "Ironclad Public API \u2014 Exports"
  description: "Ironclad Public API \u2014 Exports. 3 operations across 3 resource paths. Self-contained Naftiko capability\
    \ covering the Ironclad Exports business surface."
  tags:
  - Ironclad
  - Exports
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    IRONCLAD_ACCESS_TOKEN: IRONCLAD_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: exports
    baseUri: https://na1.ironcladapp.com/public/api/v1
    description: Ironclad Exports business capability.
    resources:
    - name: exports
      path: /exports
      operations: &id001
      - name: export
        method: POST
        description: Submit a request to generate a new data export
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: exports-jobid
      path: /exports/{jobId}
      operations: &id002
      - name: export-job
        method: GET
        description: Check Data Export Job Status
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The job id to be checked.
          required: true
    - name: exports-jobid-download
      path: /exports/{jobId}/download
      operations: &id003
      - name: export-job-download
        method: GET
        description: Download Data Export File
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: jobId
          in: path
          type: string
          description: The job id to be checked.
          required: true
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.IRONCLAD_ACCESS_TOKEN}}
      placement: header
  exposes:
  - type: rest
    namespace: exports-rest
    port: 8080
    description: REST adapter for Ironclad Exports. One resource per consumed operation.
    resources:
    - name: exports
      path: /v1/exports
      operations: *id001
    - name: exports-jobid
      path: /v1/exports/{jobId}
      operations: *id002
    - name: exports-jobid-download
      path: /v1/exports/{jobId}/download
      operations: *id003
