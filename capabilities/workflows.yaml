        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: asyncJobId
          in: path
          type: string
          description: The identifier provided in the response of creating a Workflow asynchronously.
          required: true
    - name: workflows-id
