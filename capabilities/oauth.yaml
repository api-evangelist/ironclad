naftiko: 1.0.0-alpha2
info:
  label: Ironclad OAuth 2.0 API
  description: Ironclad OAuth 2.0 API. 4 operations across 4 resource paths. Self-contained Naftiko capability covering the
    Ironclad OAuth business surface.
  tags:
  - Ironclad
  - OAuth
  created: '2026-05-25'
  modified: '2026-05-25'
binds:
- namespace: env
  keys:
    IRONCLAD_ACCESS_TOKEN: IRONCLAD_ACCESS_TOKEN
capability:
  consumes:
  - type: http
    namespace: oauth
    baseUri: https://na1.ironcladapp.com/oauth
    description: Ironclad OAuth business capability.
    resources:
    - name: authorize
      path: /authorize
      operations: &id001
      - name: oauth-authorize
        method: GET
        description: Initiate an Authorization Transaction
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: token
      path: /token
      operations: &id002
      - name: oauth-token
        method: POST
        description: Request a Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: company-info
      path: /company-info
      operations: &id003
      - name: oauth-company-info
        method: GET
        description: Retrieve Company Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    - name: userinfo
      path: /userinfo
      operations: &id004
      - name: oauth-userinfo
        method: GET
        description: Retrieve Token User Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters: []
    authentication:
      type: apikey
      key: Authorization
      value: Bearer {{env.IRONCLAD_ACCESS_TOKEN}}
      placement: header
  exposes:
  - type: rest
    namespace: oauth-rest
    port: 8080
    description: REST adapter for Ironclad OAuth. One resource per consumed operation.
    resources:
    - name: authorize
      path: /v1/authorize
      operations: *id001
    - name: token
      path: /v1/token
      operations: *id002
    - name: company-info
      path: /v1/company-info
      operations: *id003
    - name: userinfo
      path: /v1/userinfo
      operations: *id004
