openapi: 3.1.0
info:
  title: Ironclad OAuth 2.0 Authorization Records API
  description: Documentation for Ironclad's OAuth 2.0 Implementation. More details on the [OAuth 2.0 specification](https://datatracker.ietf.org/doc/html/rfc6749).
  version: '1'
  contact:
    name: Ironclad Support
    email: support@ironcladapp.com
servers:
- url: https://na1.ironcladapp.com/oauth
  description: Production server
- url: https://eu1.ironcladapp.com/oauth
  description: EU Production server
- url: https://demo.ironcladapp.com/oauth
  description: Demo server
tags:
- name: Records
  description: Documentation on Ironclad Records.
paths:
  /records:
    get:
      summary: List All Records
      description: "View all records in the company, with filtering available via query parameters. \n\n**OAuth Scope required:** `public.records.readRecords`"
      operationId: list-all-records
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/QueryPageNumber'
      - $ref: '#/components/parameters/QueryPageSize'
      - $ref: '#/components/parameters/HydrateEntitiesFlag'
      - $ref: '#/components/parameters/RecordType'
      - $ref: '#/components/parameters/RecordLastUpdated'
      - $ref: '#/components/parameters/RecordFilter'
      - name: sortField
        in: query
        description: The field to sort Records. Only one field is supported in the sort operation.
        schema:
          type: string
          enum:
          - agreementDate
          - name
          - lastUpdated
          default: agreementDate
      - name: sortDirection
        in: query
        description: The direction the records are sorted by in correlation with the `sortField`.
        schema:
          type: string
          enum:
          - ASC
          - DESC
          default: DESC
      - $ref: '#/components/parameters/addressAsObject'
      security:
      - sec0: []
        OAuth2:
        - public.records.readRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                    example: 0
                    default: 0
                  pageSize:
                    type: integer
                    example: 20
                    default: 0
                  count:
                    type: integer
                    example: 1234
                    default: 0
                  list:
                    type: array
                    items:
                      $ref: '#/components/schemas/RecordModel'
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
    post:
      summary: Create a Record
      description: "Create a contract record by specifying its intended metadata properties. See [more documentation](https://developer.ironcladapp.com/docs/create-a-record-1) on creating a record. \n\n**OAuth Scope required:** `public.records.createRecords`"
      operationId: create-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/addressAsObject'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - name
              - properties
              properties:
                type:
                  type: string
                  description: The type of record to be created. You can view available record types by retrieving records metadata.
                name:
                  type: string
                  description: The name of the record.
                properties:
                  type: object
                  description: Object containing key/value pairs of metadata attached to the record. The key you specify must have a value with a supported type as outlined in the Supported Property Types section.
                  properties:
                    agreementDate:
                      type: object
                      description: The date of the agreement.
                      properties:
                        type:
                          type: string
                          default: date
                        value:
                          type: string
                          description: UTC date (e.g. `2018-05-08T00:00:00-07:00`)
                    counterpartyName:
                      type: object
                      description: The name of the counterparty.
                      properties:
                        type:
                          type: string
                          default: string
                        value:
                          type: string
                          description: The name of the counterparty.
                    contractValue:
                      type: object
                      description: The monetary value of the contract.
                      properties:
                        type:
                          type: string
                          default: monetary_amount
                        value:
                          type: object
                          description: The monetary amount value
                          required:
                          - amount
                          - currency
                          properties:
                            currency:
                              type: string
                              description: The currency in ISO 4217 format
                              example: USD
                            amount:
                              type: number
                              description: The monetary amount
                              example: 100000
                links:
                  type: array
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
                parent:
                  $ref: '#/components/schemas/RecordParentModel'
                propertiesToAmend:
                  $ref: '#/components/schemas/PropertiesToAmend'
                children:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the records to be set as child records of the current record.
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
      security:
      - sec0: []
        OAuth2:
        - public.records.createRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordModel'
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  param:
                    type: string
              examples:
                invalidRecordType:
                  summary: Unknown record type.
                  value:
                    code: INVALID_PARAM
                    message: unknown record type my_nonexistent_record_type
                    param: type
                invalidRecordProperty:
                  summary: Unknown record property.
                  value:
                    code: INVALID_PARAM
                    message: unknown property my_nonexistent_record_property
                    param: properties.my_non_existent_record_property
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
      tags:
      - Records
  /records/attachments/download-urls:
    post:
      summary: Create Attachment Download URLs
      description: 'Request signed download URLs for record attachments in bulk (currently only latest signed copy is supported). Returns a job ID that can be polled for results.


        **OAuth Scope required:** `public.records.readAttachments`'
      operationId: create-attachment-download-urls
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
              - identifiers
              - type
              properties:
                identifiers:
                  type: array
                  items:
                    type: string
                  maxItems: 100
                  description: An array of record IDs or Ironclad IDs to generate download URLs for.
                type:
                  type: string
                  enum:
                  - latestSignedCopy
                  description: The type of attachment to generate download URLs for.
      security:
      - sec0: []
        OAuth2:
        - public.records.readAttachments
      responses:
        '202':
          description: Job accepted for processing.
          content:
            application/json:
              schema:
                type: object
                required:
                - jobId
                - status
                properties:
                  jobId:
                    type: string
                    description: An opaque job identifier to poll for results.
                  status:
                    type: string
                    enum:
                    - processing
                    description: The current status of the job.
        '400':
          $ref: '#/components/responses/BadRequestError400'
        '401':
          $ref: '#/components/responses/UnauthorizedError401'
        '403':
          $ref: '#/components/responses/ForbiddenError403'
      tags:
      - Records
  /records/attachments/download-urls/{jobId}:
    get:
      summary: Get Attachment Download URLs Status
      description: 'Poll the status of a previously submitted attachment download URLs job.


        **OAuth Scope required:** `public.records.readAttachments`'
      operationId: get-attachment-download-urls-status
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: jobId
        in: path
        required: true
        schema:
          type: string
        description: The job ID returned from the create attachment download URLs endpoint.
      security:
      - sec0: []
        OAuth2:
        - public.records.readAttachments
      responses:
        '200':
          description: The current status of the job.
          content:
            application/json:
              schema:
                type: object
                required:
                - jobId
                - status
                properties:
                  jobId:
                    type: string
                    description: The opaque job identifier.
                  status:
                    type: string
                    enum:
                    - processing
                    - complete
                    - failed
                    description: The current status of the job.
                  succeeded:
                    type: array
                    description: Array of objects with successfully generated download URLs. Present when status is complete.
                    items:
                      type: object
                      required:
                      - identifier
                      - ironcladId
                      - recordId
                      - downloadUrl
                      - filename
                      - fileKey
                      - fileHash
                      - expiration
                      properties:
                        identifier:
                          type: string
                          description: The identifier of the record that was passed in the request (record ID or Ironclad ID).
                          example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                        ironcladId:
                          type: string
                          description: The Ironclad ID of the record.
                          example: IC-123
                        recordId:
                          type: string
                          description: The globally unique UUID-based record ID of the record.
                          example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                        downloadUrl:
                          type: string
                          description: The signed download URL for the attachment.
                          example: https://storage.googleapis.com/ic_record_attachments/645aae3352150fe4e59ef90/6f5c8167-81a6-459c-a53c-eec9fa7e91c9/8674ec0992b199f7902d2459fc0f60b34616db93d28568f7003f6f1d1?X-Goog-Algorithm=GOOG4-RSA-SHA256&X-Goog-Credential=sa-ic-dev%40na1-flex-c34f.iam.gserviceaccount.com%2F20260306%2Fauto%2Fstorage%2Fgoog4_request&X-Goog-Date=20260306T230715Z&X-Goog-Expires=1200&X-Goog-SignedHeaders=host&response-content-disposition=attachment%3B%20filename%3D%22nda-with-table.pdf%22&X-Goog-
                        filename:
                          type: string
                          description: The filename of the attachment.
                          example: contract.pdf
                        fileKey:
                          type: string
                          description: The key of the attachment.
                          example: signedCopy[1]
                        fileId:
                          type: string
                          description: The ID of the attachment.
                          example: d2079940-3049-4883-8931-2210a3864504
                        fileHash:
                          type: string
                          description: The hash of the attachment.
                          example: 8674ec0992b199f79c5802d2459fc0f60b3461601fcdb93d28568f7003f6f1d1
                        expiration:
                          type: string
                          format: date-time
                          description: The expiration date of the signed download URL in ISO 8601 format.
                          example: '2026-03-07T00:00:00.000Z'
                  failed:
                    type: array
                    description: Array of identifiers that failed to generate a signed download URL. Present when status is complete.
                    items:
                      type: object
                      required:
                      - identifier
                      - errorCode
                      - errorMessage
                      properties:
                        identifier:
                          type: string
                          description: The identifier of the record that was passed in the request (record ID or Ironclad ID).
                          example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                        ironcladId:
                          type: string
                          description: The Ironclad ID of the record, if resolved.
                          example: IC-123
                        recordId:
                          type: string
                          description: The globally unique UUID-based record ID of the record, if resolved.
                          example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                        errorCode:
                          type: string
                          enum:
                          - RECORD_NOT_FOUND
                          - ACCESS_DENIED
                          - NO_ATTACHMENT_FOUND
                          - INTERNAL_ERROR
                          description: The error code that occurred when generating the signed download URL.
                        errorMessage:
                          type: string
                          description: The error message that occurred when generating the signed download URL.
                          example: Access denied
        '401':
          $ref: '#/components/responses/UnauthorizedError401'
        '403':
          $ref: '#/components/responses/ForbiddenError403'
        '404':
          $ref: '#/components/responses/NotFoundError404'
      tags:
      - Records
  /records/smart-import:
    get:
      summary: Retrieve Predictions
      description: "Retrieve status of predictions of specific smart import record or all records in an import, one of Record Id or Import Id is required. \n\n**OAuth Scope required:** `public.records.readSmartImportRecords`"
      operationId: retrieve-import-predictions
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: recordId
        in: query
        description: The ID of the Record for prediction status.
        schema:
          type: string
        required: false
      - name: importId
        in: query
        description: The ID of the Import for prediction statuses.
        schema:
          type: string
        required: false
      security:
      - sec0: []
        OAuth2:
        - public.records.readSmartImportRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/SmartImportRetrievePredictionsResponseElement'
                  description: If `importId` was not provided, the response will be a single object.
                - title: Array of Prediction Statuses
                  description: If `importId` was provided, the response will be an array of objects.
                  type: array
                  items:
                    $ref: '#/components/schemas/SmartImportRetrievePredictionsResponseElement'
              examples:
                Single Result:
                  value:
                    recordId: df1c2805-f5a3-4a14-9386-c28d950dff49
                    status: ready
                Array Result:
                  value:
                  - recordId: df1c2805-f5a3-4a14-9386-c28d950dff49
                    status: ready
                  - recordId: 9b760581-df10-447a-8782-55b4bd7f2404
                    status: ready
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                invalidRecordType:
                  summary: Missing Record Id or Import Id from query.
                  value:
                    code: INVALID_PARAM
                    message: missing required form-data part 'recordId' or 'importId
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                outOfSmartImportCredits:
                  summary: Smart Imports not enabled for company.
                  value:
                    code: FORBIDDEN
                    message: 'Reading smart import records not allowed for company with id invalid-company-id '
        '404':
          description: '404'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                invalidImportId:
                  summary: Record Id is invalid or does not exist
                  value:
                    code: NOT_FOUND
                    message: 'couldn''t find predictions for the record: invalid-record-id'
      tags:
      - Records
    post:
      summary: Create a Smart Import Record
      description: "Upload a file to create a record with smart import and predictions.  Provide none of recordType, newRecordTypeId, or newRecordTypeDisplayName to default to Imported type. \n\n**OAuth Scope required:** `public.records.createSmartImportRecords`"
      operationId: create-a-smart-import-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - attachment
              properties:
                attachment:
                  type: string
                  format: binary
                  description: Must be a binary. Base64 is not accepted at this time.
                recordType:
                  type: string
                  default: imported
                  description: Upload a smart import record as an existing record type.  Cannot provide alongside newRecordTypeId and newRecordTypeDisplayName. Defaults to Imported.
                newRecordTypeId:
                  type: string
                  description: The record type ID for a not-yet-existing record type.  Must be provided along with a newRecordTypeDisplayName
                newRecordTypeDisplayName:
                  type: string
                  description: The display name of the new record type to create.
      security:
      - sec0: []
        OAuth2:
        - public.records.createSmartImportRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  recordId:
                    type: string
                    description: Record ID of the new created record
                    example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                  importId:
                    type: string
                    example: 55ez635d-f2g9-5419-gs34-8h1jx4s733q9
                  remainingCredits:
                    type: number
                    example: 50
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  param:
                    type: string
              examples:
                invalidRecordType:
                  summary: Invalid record type.
                  value:
                    code: INVALID_PARAM
                    message: unknown record type invalid_record_type
                    param: type
                invalidAttachment:
                  summary: Document size is too large.
                  value:
                    code: INVALID_PARAM
                    message: parameter 'attachment' too large, please limit upload files less than 100MB
                    param: attachment
                invalidFileType:
                  summary: Document size is too large.
                  value:
                    code: INVALID_PARAM
                    message: 'filename invalidFile.xyz does not have an accepted extension. Only the following extensions are allowed: .pdf, .docx, .doc, .xls, .xlsx, .eml, .tif, .jpg, .png, .jpeg, .txt, .ppt, .pptx.'
                    param: metadata.filename
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                outOfSmartImportCredits:
                  summary: No more AI Contract Credits are available
                  value:
                    code: FORBIDDEN
                    message: No more AI Contract Credits available
        '404':
          description: '404'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                invalidImportId:
                  summary: Import Id is invalid or does not exist
                  value:
                    code: NOT_FOUND
                    message: couldn't find a record matching the id invalid-import-id
      tags:
      - Records
  /records/smart-import/{importId}:
    post:
      summary: Upload a Smart Import Record to an existing Import
      description: "Upload a file to an existing import and create a record with smart import and predictions. Provide none of recordType, newRecordTypeId, or newRecordTypeDisplayName to default to Imported type. \n\n**OAuth Scope required:** `public.records.createSmartImportRecords`"
      operationId: create-a-smart-import-record-to-import
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: importId
        in: path
        description: 'The Import Id. You can upload a record to an existing import in the repository. '
        schema:
          type: string
        required: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              required:
              - attachment
              - recordType
              type: object
              properties:
                attachment:
                  type: string
                  format: binary
                  description: Must be a binary. Base64 is not accepted at this time.
                recordType:
                  type: string
                  default: imported
                  description: Upload a smart import record as an existing record type.  Cannot provide alongside newRecordTypeId and newRecordTypeDisplayName. Defaults to Imported.
                newRecordTypeId:
                  type: string
                  description: The record type ID for a not-yet-existing record type.  Must be provided along with a newRecordTypeDisplayName
                newRecordTypeDisplayName:
                  type: string
                  description: The display name of the new record type to create.
      security:
      - sec0: []
        OAuth2:
        - public.records.createSmartImportRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  recordId:
                    type: string
                    description: Record ID of the new created record
                    example: 17fe582d-e1e0-4000-bf65-3d2ec2c500a4
                  importId:
                    type: string
                    example: 55ez635d-f2g9-5419-gs34-8h1jx4s733q9
                  remainingCredits:
                    type: number
                    example: 50
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
                  param:
                    type: string
              examples:
                invalidRecordType:
                  summary: Invalid record type.
                  value:
                    code: INVALID_PARAM
                    message: unknown record type invalid_record_type
                    param: recordType
                invalidAttachment:
                  summary: Document size is too large.
                  value:
                    code: INVALID_PARAM
                    message: parameter 'attachment' too large, please limit upload files less than 100MB
                    param: attachment
                invalidFileType:
                  summary: Document size is too large.
                  value:
                    code: INVALID_PARAM
                    message: 'filename invalidFile.xyz does not have an accepted extension. Only the following extensions are allowed: .pdf, .docx, .doc, .xls, .xlsx, .eml, .tif, .jpg, .png, .jpeg, .txt, .ppt, .pptx.'
                    param: metadata.filename
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                outOfSmartImportCredits:
                  summary: No more AI Contract Credits are available
                  value:
                    code: FORBIDDEN
                    message: No more AI Contract Credits available
        '404':
          description: '404'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  message:
                    type: string
              examples:
                invalidImportId:
                  summary: Import Id is invalid or does not exist
                  value:
                    code: NOT_FOUND
                    message: couldn't find a record matching the id invalid-import-id
      tags:
      - Records
  /records/{id}:
    get:
      summary: Retrieve a Record
      description: "View a specific record and its associated data. \n\n**OAuth Scope required:** `public.records.readRecords`"
      operationId: retrieve-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/HydrateEntitiesFlag'
      - $ref: '#/components/parameters/addressAsObject'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record.
        schema:
          type: string
        required: true
      security:
      - sec0: []
        OAuth2:
        - public.records.readRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordModel'
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
    put:
      summary: Replace a Record
      description: "Update an existing record with a new set of metadata. \n\n**OAuth Scope required:** `public.records.updateRecords`"
      operationId: replace-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/addressAsObject'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record.
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
              - type
              - name
              - properties
              properties:
                type:
                  type: string
                  description: The type of record to be created. You can view available record types by retrieving records metadata.
                name:
                  type: string
                  description: The name of the record.
                properties:
                  type: object
                  description: Object containing key/value pairs of metadata attached to the record. The key you specify must have a value with a supported type as outlined in the Supported Property Types section.
                  properties:
                    agreementDate:
                      type: object
                      description: The date of the agreement.
                      properties:
                        type:
                          type: string
                          default: date
                        value:
                          type: string
                          description: UTC date (e.g. `2018-05-08T00:00:00-07:00`)
                    counterpartyName:
                      type: object
                      description: The name of the counterparty.
                      properties:
                        type:
                          type: string
                          default: string
                        value:
                          type: string
                          description: The name of the counterparty.
                parent:
                  $ref: '#/components/schemas/RecordParentModel'
                propertiesToAmend:
                  $ref: '#/components/schemas/PropertiesToAmend'
                children:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the records to be set as child records of the current record.
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
      security:
      - sec0: []
        OAuth2:
        - public.records.updateRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordModel'
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
    delete:
      summary: Delete a Record
      description: "Delete an existing record. \n\n**OAuth Scope required:** `public.records.deleteRecords`"
      operationId: delete-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record.
        schema:
          type: string
        required: true
      security:
      - sec0: []
        OAuth2:
        - public.records.deleteRecords
      responses:
        '204':
          description: '204'
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: '404'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
    patch:
      summary: Update Record Metadata
      description: "Update specific fields on a record. \n\n**OAuth Scope required:** `public.records.updateRecords`"
      operationId: update-record-metadata
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/addressAsObject'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record.
        schema:
          type: string
        required: true
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: false
              properties:
                type:
                  type: string
                  description: The type of Record.
                name:
                  type: string
                  description: The name of the Record.
                addProperties:
                  type: object
                  description: A key:value map of properties to add. The two below are examples.
                  additionalProperties: true
                  properties:
                    counterpartyName:
                      type: object
                      required:
                      - type
                      - value
                      properties:
                        type:
                          type: string
                          default: string
                        value:
                          type: string
                          example: Jane Doe
                    agreementDate:
                      type: object
                      required:
                      - type
                      - value
                      properties:
                        type:
                          type: string
                          default: date
                          example: date
                        value:
                          type: string
                          example: '2018-05-08T00:00:00-07:00'
                removeProperties:
                  type: array
                  description: List of record property ids to be removed (e.g., ['counterpartyAddress', 'agreementExpirationDate'])
                  items:
                    type: string
                addLinks:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the records to link. For an explanation of Record IDs or Ironclad IDs and how to find them, see [Getting Started](https://developer.ironcladapp.com/reference/getting-started-api).
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
                removeLinks:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the record links to remove. For an explanation of Record IDs or Ironclad IDs and how to find them, see [Getting Started](https://developer.ironcladapp.com/reference/getting-started-api).
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
                setParent:
                  $ref: '#/components/schemas/RecordParentModel'
                addChildren:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the records to be set as child records of the current record.
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
                removeParent:
                  type: boolean
                  description: Boolean flag to indicate if the parent id should be removed for the current record.
                  example: false
                removeChildren:
                  type: array
                  description: List of objects containing the Record IDs or Ironclad IDs of the child records to be removed from the current record.
                  items:
                    $ref: '#/components/schemas/RecordPropertyLinkModel'
                addPropertiesToAmend:
                  $ref: '#/components/schemas/PropertiesToAmend'
                removePropertiesToAmend:
                  type: array
                  description: List of property IDs to stop deriving from this amendment record to the parent record. Removes existing derived property relationships, allowing the parent record to revert to its non-amended value for those fields.
                  items:
                    type: string
            examples:
              Request Example:
                value:
                  type: consultingAgreement
                  name: Consulting Agreement with Jane Doe
                  addProperties:
                    agreementDate:
                      type: date
                      value: '2018-05-08T00:00:00-07:00'
                    counterpartyName:
                      type: string
                      value: Jane Doe
                  removeProperties:
                  - counterpartySigner
                  setParent:
                    recordId: 17009e0d-z2e9-425d-a85b-1cf152773efg
                  addLinks:
                  - recordId: df1c2805-f5a3-4a14-9386-c28d950dff49
                  removeLinks:
                  - recordId: df1c2805-f5a3-4a14-9386-c28d950dff49
              Set as amendment example:
                value:
                  setParent:
                    parentLinkType: amendment
                    recordId: 17009e0d-z2e9-425d-a85b-1cf152773efg
              Amendment with roll-up example:
                value:
                  setParent:
                    parentLinkType: amendment
                    recordId: 17009e0d-z2e9-425d-a85b-1cf152773efg
                  addPropertiesToAmend:
                    counterpartyName:
                      amendmentType: replace
                    agreementValue:
                      amendmentType: replace
              Amendment with readableId example:
                value:
                  setParent:
                    parentLinkType: amendment
                    recordId: IC-12345
                  addPropertiesToAmend:
                    counterpartyName:
                      amendmentType: replace
              Remove derived properties example:
                value:
                  removePropertiesToAmend:
                  - counterpartyName
                  - agreementValue
      security:
      - sec0: []
        OAuth2:
        - public.records.updateRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RecordModel'
              examples:
                Get Amendment Record:
                  value:
                    id: IC-124
                    ironcladId: IC-124
                    name: 'Amendment #1 - Updated Terms'
                    lastUpdated: '2024-01-01T00:00:00Z'
                    type: nda
                    attachments: {}
                    links: []
                    parentId: IC-123
                    parentLinkType: amendment
                    properties:
                      counterpartyName:
                        type: string
                        value: Acme Corporation Ltd
                      contractValue:
                        type: monetary_amount
                        value:
                          amount: 150000
                          currency: USD
                Get Parent Record with Amended Properties:
                  value:
                    id: IC-123
                    ironcladId: IC-123
                    name: Master NDA with Acme Corp
                    lastUpdated: '2024-01-01T00:00:00Z'
                    type: nda
                    attachments: {}
                    links: []
                    properties:
                      counterpartyName:
                        type: string
                        originalValue: Acme Corporation
                        value: Acme Corporation Ltd
                      contractValue:
                        type: monetary_amount
                        originalValue:
                          amount: 100000
                          currency: USD
                        value:
                          amount: 150000
                          currency: USD
                      expirationDate:
                        type: date
                        value: '2024-12-31T00:00:00Z'
                    amendments:
                    - IC-124
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: MISSING_PARAM
                  message:
                    type: string
                    example: reason why something has gone wrong
                  param:
                    type: string
                    example: parameter identifier
        '404':
          description: '404'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NOT_FOUND
                  message:
                    type: string
                    example: not found
                  param:
                    type: string
                    example: parameter identifier
      tags:
      - Records
  /records/metadata:
    get:
      summary: Retrieve Records Schema
      description: "View the schema associated with contract records, including available record types and metadata properties. \n\n**OAuth Scope required:** `public.records.readSchemas`"
      operationId: list-all-records-metadata
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      security:
      - sec0: []
        OAuth2:
        - public.records.readSchemas
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  recordTypes:
                    type: object
                    properties:
                      contract:
                        type: object
                        properties:
                          displayName:
                            type: string
                            example: Contract
                  properties:
                    type: object
                    properties:
                      additionalNotes:
                        type: object
                        properties:
                          displayName:
                            type: string
                            example: Additional Notes
                          type:
                            type: string
                            example: string
                          visible:
                            type: boolean
                            example: true
                            default: true
                      agreementDate:
                        type: object
                        properties:
                          displayName:
                            type: string
                            example: Agreement Date
                          type:
                            type: string
                            example: date
                          visible:
                            type: boolean
                            example: true
                            default: true
                      workflowId:
                        type: object
                        properties:
                          displayName:
                            type: string
                            example: Workflow ID
                          type:
                            type: string
                            example: string
                          visible:
                            type: boolean
                            example: true
                            default: true
                  attachments:
                    type: object
                    properties:
                      signedCopy:
                        type: object
                        properties:
                          displayName:
                            type: string
                            example: Signed PDF
                  links:
                    type: object
                    properties: {}
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
  /records/{id}/attachments/{key}:
    post:
      summary: Create an Attachment on a Record
      description: "Create an attachment on a specified record at the specified attachment key. \n\n**OAuth Scope required:** `public.records.createAttachments`"
      operationId: create-an-attachment-on-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record. For an explanation of Record IDs or Ironclad IDs and how to find them, see [Getting Started](https://developer.ironcladapp.com/reference/getting-started-api).
        schema:
          type: string
        required: true
      - name: key
        in: path
        description: The attachment key at which to store the attachment. This can be any arbitrary string.
        schema:
          type: string
          default: signedCopy
        required: true
      - $ref: '#/components/parameters/addressAsObject'
      security:
      - sec0: []
        OAuth2:
        - public.records.createAttachments
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                attachment:
                  type: string
                  format: binary
                  description: Must be a binary. Base64 is not accepted at this time.
                metadata:
                  type: object
                  description: 'The `metadata` property''s value must be `{"filename": "[YOUR_FILE_NAME]"}`'
                  properties:
                    filename:
                      type: string
                      description: The name of the file. Must have a supported file extension (doc, docx, pdf).
                      example: NDA - Acme LLC.pdf
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          $ref: '#/components/responses/RecordAttachmentResponse400'
      tags:
      - Records
    get:
      summary: Retrieve an Attachment on a Record
      description: "View an attachment associated with a specific record. \n\n**OAuth Scope required:** `public.records.readAttachments`"
      operationId: retrieve-an-attachment-on-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: id
        in: path
        description: The ID of the Record.
        schema:
          type: string
        required: true
      - name: key
        in: path
        description: The attachment key.
        schema:
          type: string
          default: signedCopy
        required: true
      security:
      - sec0: []
        OAuth2:
        - public.records.readAttachments
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
    delete:
      summary: Delete an Attachment on a Record
      description: "Remove an attachment associated with a specific record. \n\n**OAuth Scope required:** `public.records.deleteAttachments`"
      operationId: delete-an-attachment-on-a-record
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record.
        schema:
          type: string
        required: true
      - name: key
        in: path
        description: The attachment key.
        schema:
          type: string
          default: signedCopy
        required: true
      security:
      - sec0: []
        OAuth2:
        - public.records.deleteAttachments
      responses:
        '204':
          description: '204'
        '404':
          $ref: '#/components/responses/AttachmentDeleteResponse404'
      tags:
      - Records
  /records/{id}/actions:
    post:
      summary: Run an Action on a Record
      description: "Runs an action on the contract. It supports lifecycle actions such as activating a contract. \n\n**OAuth Scope required:** `public.records.applyContractAction`"
      operationId: run-an-action-on-a-record
      parameters:
      - name: id
        in: path
        description: The ID or Ironclad ID of the Record. For an explanation of Record IDs or Ironclad IDs and how to find them, see [Getting Started](https://developer.ironcladapp.com/reference/getting-started-api).
        schema:
          type: string
        required: true
      security:
      - sec0: []
        OAuth2:
        - public.records.applyContractAction
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContractAction'
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ContractAction'
        '400':
          $ref: '#/components/responses/ContractActionResponse400'
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: FORBIDDEN
                  message:
                    type: string
                    example: access forbidden
        '404':
          description: 404 not found
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    example: NOT_FOUND
                  message:
                    type: string
                    example: no obligations found
      tags:
      - Records
  /records/export:
    get:
      summary: Retrieve XLSX Export File of Records
      description: "Export a records report with filtering available via query parameters. \n\n**OAuth Scope required:** `public.records.readRecords`"
      operationId: retrieve-xlsx-export-file-of-all-records
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - name: types
        in: query
        description: 'Comma separated list of record types to export. Example: `mutualNDA,NDA`'
        schema:
          type: string
      - name: properties
        in: query
        description: 'IDs of properties to export, comma separated. Example: `counterpartyName,agreementDate`'
        schema:
          type: string
      security:
      - sec0: []
        OAuth2:
        - public.records.readRecords
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              schema:
                type: object
                properties: {}
      tags:
      - Records
components:
  schemas:
    ClauseLanguagePositionPlaybook:
      title: Clause Language Position Playbook
      type: object
      description: A playbook clause language position
      required:
      - type
      - name
      - preferred
      properties:
        type:
          type: string
          description: The source type of the playbook clause
          enum:
          - playbook
          example: playbook
        name:
          type: string
          description: The name of the playbook clause
          example: Standard
        preferred:
          type: boolean
          description: Whether the playbook clause is the preferred language
          example: true
    BadRequestErrorRecordNotFound:
      type: object
      description: Bad request error. The specified record does not exist.
      title: Bad Request Error - Record Does not Exist
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: couldn't find a record matching the id workflow:6346f76fb8fc01d2b43e7c15a
    RecordPropertyArray:
      title: Record Property Array
      type: object
      description: An array-type record property
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: The data type of the property
          enum:
          - array
          example: array
        value:
          type: array
          items:
            type: string
          minItems: 1
          example:
          - red
          - blue
    SourcedFromIntegration:
      title: Sourced From Integration
      type: object
      description: Record created from an integration
      required:
      - type
      - integrationName
      properties:
        type:
          type: string
          description: The source type of the record
          enum:
          - integration
          example: integration
        integrationName:
          type: string
          description: The name of the integration that created the record
          example: s4hana
    RecordPropertyPlaybookClause:
      type: object
      description: A playbook-based clause-type record property
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: The data type of the property
          enum:
          - playbookClause
          example: playbookClause
        value:
          type: string
          description: The playbook clause name
          example: Standard
    EffectiveContractActionProperties:
      type: object
      properties:
        standard_initialTermLength:
          type: object
          description: The initial term is the time from the effective date that the agreement will be effective for. If not defined, then the agreement will be active until the expiration date. If an expiration date is also not defined then the agreement will be active indefinitely, until the status of the agreement is manually changed.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - duration
            value:
              type: string
              example: P1Y
        expirationDate:
          type: object
          description: Expiration date is when this agreement will end or become inactive. If an expiration date isn't present then the effective date plus the initial term length are used to expire the contract.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - date
            value:
              type: string
              example: '2018-05-08T00:00:00-07:00'
    BadRequestErrorRecordAttachmentExtension:
      type: object
      description: Bad request error. The specified filename does not include a supported extension.
      title: Bad Request Error - Record Attachment Extension Not Supported
      properties:
        code:
          type: string
          example: INVALID_PARAM
        message:
          type: string
          example: 'filename "NDA - Acme LLC" does not have an accepted extension. Only the following extensions are allowed: .adoc, .asice, .bdoc, .csv, .ddoc, .doc, .docx, .edoc, .eml, .gif, .htm, .jpeg, .jpg, .msg, .pdf, .png, .ppt, .pptx, .rtf, .tif, .tif, .txt, .xls, .xlsx, .xml'
        param:
          type: string
          example: metadata.filename
    BadRequestErrorContractAction:
      type: object
      additionalProperties: false
      properties:
        code:
          type: string
          enum:
          - MISSING_PARAM
          - INVALID_PARAM
          - INVALID_STATE
          example: MISSING_PARAM
          readOnly: true
          description: A unique code to identify why the contract action cannot be run
          title: ''
        message:
          type: string
          example: missing required attribute
          readOnly: true
          description: A message indicating why the contract action cannot be run
          title: ''
        param:
          type: string
          example: counterpartySignerTitle
          readOnly: true
          description: The required or expected parameter(s) that may be missing in order to run the contract action
          title: ''
      required:
      - code
      - message
      - param
      readOnly: true
      description: ''
      title: Bad Request Error - Contract Action
    EntityProperties:
      type: object
      description: The entity properties associated with the entity
      additionalProperties:
        $ref: '#/components/schemas/EntityPropertyType'
    UndoContractAction:
      type: object
      required:
      - type
      - properties
      properties:
        type:
          type: string
          description: The action type to run on the contract.
          enum:
          - undo
        properties:
          type: object
          required:
          - standard_undoObligationAction
          properties:
            standard_undoObligationAction:
              type: object
              description: The action type that is being undone by an undo action.
              required:
              - type
              - value
              properties:
                type:
                  type: string
                  enum:
                  - string
                value:
                  type: string
                  enum:
                  - activate
                  - terminate
                  - supersede
                  - extend
                  - cancelAutoRenewal
                  - editRenewal
                  - undo
          additionalProperties: false
      additionalProperties: false
    RecordPropertyBoolean:
      title: Record Property Boolean
      type: object
      description: A true/false boolean-type record property
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: The data type of the property
          enum:
          - boolean
          example: boolean
        value:
          type: boolean
          description: The boolean value of the property
          example: true
        originalValue:
          type: boolean
          description: The original value of the property before amendment (only present when property is amended)
          example: false
    SourcedFromWorkflow:
      title: Sourced From Workflow
      type: object
      description: Record created from an Ironclad workflow
      required:
      - type
      - workflowId
      properties:
        type:
          type: string
          description: The source type of the record
          enum:
          - workflow
          example: workflow
        workflowId:
          type: string
          description: The unique identifier of the workflow that created the record
          example: workflow:4a785686-d3d5-47bc-960e-3df0df871ea9
    SourcedFromContract:
      title: Sourced From Contract
      type: object
      description: Record created from a contract (typically an obligation)
      required:
      - type
      - contractId
      properties:
        type:
          type: string
          description: The source type of the record
          enum:
          - contract
          example: contract
        contractId:
          type: string
          description: The unique identifier of the contract that created the record
          example: 4a785686-d3d5-47bc-960e-3df0df871ea9
    BadRequestErrorRecordAttachmentAlreadyExists:
      type: object
      description: Bad request error. The specified attachment key has an existing file.
      title: Bad Request Error - Record Attachment Already Exists.
      properties:
        code:
          type: string
          example: INVALID_PARAM
        message:
          type: string
          example: record attachment key 'signedCopy' already exists for record
        param:
          type: string
          example: attachmentKey
    RecordPropertyLinkModel:
      type: object
      required:
      - recordId
      properties:
        recordId:
          type: string
          example: 17009e0d-z2e9-425d-a85b-1cf152773e49
    BadRequestErrorRecordAttachmentIDNotFound:
      type: object
      description: Record Attachment ID Not Found Request Error
      title: Bad Request Error - Record Attachment ID Not Found
      properties:
        code:
          type: string
          example: NOT_FOUND
        message:
          type: string
          example: couldn't find an attachment matching the key [SOME_NONEXISTENT_ATTACHMENT_KEY] for record with id [RECORD_ID]
    SourcedFromImportProject:
      title: Sourced From Import Project
      type: object
      description: Record created from an import project
      required:
      - type
      - importId
      properties:
        type:
          type: string
          description: The source type of the record
          enum:
          - import_project
          example: import_project
        importId:
          type: string
          description: The unique identifier of the import project that created the record
          example: 4a785686-d3d5-47bc-960e-3df0df871ea9
    RecordModel:
      type: object
      required:
      - id
      - ironcladId
      - type
      - name
      - lastUpdated
      - properties
      - attachments
      - links
      properties:
        id:
          type: string
          description: The unique identifier of the record
          example: 22e2ff72-56a1-4711-a4ca-41328d311e9f
        ironcladId:
          type: string
          description: The unique Ironclad identifier of the record
          example: IC-1
        type:
          type: string
          description: The type of the record
