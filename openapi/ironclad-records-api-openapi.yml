              description: Base status of a contract.
              example: active
              enum:
              - active
              - inactive
              - indeterminate
            enhancedStatus:
              type: string
              description: A detailed sub-status of a contract calculated based on the lifecycle properties.
              example: auto-renewing
              enum:
              - evergreen
              - auto-renewing
              - expiring
              - terminating
              - superseding
              - extending
              - active
              - inactive
              - unknown
              - activating
              - executed
