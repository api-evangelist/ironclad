    RenewalTypeContractActionProperties:
      type: object
      required:
      - standard_renewalType
      properties:
        standard_renewalType:
          type: object
          description: "The renewal type for an agreement will govern what happens on its expiration date if it has one. Accepted values for renewal type:\n\n    \tAuto-Renew: These agreements will automatically renew on their expiration date which means they will then have a new expiration date which would be the current date plus the renewal term length.\n\n    \tOptional Extension: These agreements have an optional extension which means that the party can choose to renew the agreement by the renewal term length without renegotiating the contract. There may be a notification requirement to exercise this option.\n\n    \tEvergreen: These are agreements that don't have an expiration date, which means they are active forever. Also known as perpetual agreements.\n\n    \tNone: These agreements that don't have a renewal provision and will expire on their expiration date. If an agreement has no renewal provision but also doesn't have an expiration date, it'll be active forever.\n\n    \tOther: For renewal provisions that are not covered by these options."
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - string
            value:
              type: string
              enum:
              - Auto-Renew
              - Optional Extension
              - Evergreen
              - None
              - Other
        otherRenewalType:
          type: object
          description: This property helps downstream reporting for when you have a renewal type not defined by the system.
          required:
          - type
          - value
          properties:
            type:
              type: string
              enum:
              - string
            value:
              type: string
              example: Custom Auto-Renew
    SourcedFromMetadataImport:
      title: Sourced From Metadata Import
      type: object
      description: Record created from a metadata import
      required:
      - type
      - metadataImportId
      properties:
        type:
          type: string
          description: The source type of the record
          enum:
          - metadata_import
          example: metadata_import
        metadataImportId:
          type: string
          description: The unique identifier of the metadata import that created the record
          example: 4a785686-d3d5-47bc-960e-3df0df871ea9
    RollUpConfiguration:
      type: object
      required:
      - amendmentType
      properties:
        amendmentType:
          type: string
          enum:
          - replace
          description: How to amend the property value. Currently only 'replace' is supported.
    SupersedeContractAction:
      type: object
      required:
      - type
      - properties
      properties:
        type:
          type: string
          description: The action type to run on the contract.
          enum:
          - supersede
        properties:
          type: object
          required:
          - standard_supersededDate
          - standard_supersessionEffectiveDate
          properties:
            standard_supersededDate:
              type: object
              description: Superseded Date
              required:
              - type
              - value
              properties:
                type:
                  type: string
                  enum:
                  - date
                value:
                  type: string
                  example: '2018-05-08T00:00:00-07:00'
            standard_supersessionEffectiveDate:
              type: object
              description: Supersession Effective Date
              required:
              - type
              - value
              properties:
                type:
                  type: string
                  enum:
                  - date
                value:
                  type: string
                  example: '2018-05-08T00:00:00-07:00'
            standard_supersedingRecordId:
              type: object
              description: The record ID for the contract that has superseded this contract.
              required:
              - type
              - value
              properties:
                type:
                  type: string
                  enum:
                  - string
                value:
                  type: string
                  example: 715f1e37-292f-4e6c-8b48-c07e1b68bccd
    RecordPropertyString:
      title: Record Property String
      type: object
      description: A text-type record property
      required:
      - type
      - value
      properties:
        type:
          type: string
          description: The data type of the property
          enum:
          - string
          example: string
        value:
          type: string
          description: The string value of the property
          example: Foobar
        originalValue:
          type: string
          description: The original value of the property before amendment (only present when property is amended)
          example: Original Value
  responses:
    BadRequestError400:
      description: '400'
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                example: MISSING_PARAM
              message:
                type: string
                example: reason why something has gone wrong
              param:
                type: string
                example: parameter identifier
    NotFoundError404:
      description: '404'
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                example: NOT_FOUND
              message:
                type: string
                example: not found
    AttachmentDeleteResponse404:
      description: Bad request error when deleting attachment.
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/BadRequestErrorRecordIDNotFound'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentIDNotFound'
    ContractActionResponse400:
      description: Bad input for contract action
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/BadRequestErrorContractAction'
    UnauthorizedError401:
      description: '401'
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                enum:
                - UNAUTHORIZED
                example: UNAUTHORIZED
              message:
                type: string
                example: invalid authentication token
          examples:
            invalidToken:
              value:
                code: UNAUTHORIZED
                message: invalid authentication token
            revokedToken:
              value:
                code: UNAUTHORIZED
                message: token has been revoked
            expiredToken:
              value:
                code: UNAUTHORIZED
                message: token has expired
    RecordAttachmentResponse400:
      description: Bad request error for creating record attachment.
      content:
        application/json:
          schema:
            oneOf:
            - $ref: '#/components/schemas/BadRequestErrorRecordNotFound'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentExtension'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentAlreadyExists'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentUnknownAttachmentKey'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentUnknownContentType'
            - $ref: '#/components/schemas/BadRequestErrorRecordAttachmentMissingFormDataPart'
    ForbiddenError403:
      description: '403'
      content:
        application/json:
          schema:
            type: object
            properties:
              code:
                type: string
                example: FORBIDDEN
              message:
                type: string
                example: access forbidden
  parameters:
    QueryPageSize:
      name: pageSize
      in: query
      description: A limit of the number of results to return.
      schema:
        type: integer
        format: int32
        minimum: 1
        maximum: 100
        default: 20
    RecordType:
      name: types
      in: query
      description: Comma separated (no spaces) record types to export. Use the [Retrieve Records Schema](https://developer.ironcladapp.com/reference/list-all-records-metadata) endpoint to retrieve a list of types.
      example: mutualNDA,consultingAgreement
      schema:
        type: string
    XAsUserId:
      name: x-as-user-id
      in: header
      description: Denotes the actor of the request. When used, the API will take into account this user's permissions and access. This or `x-as-user-email` is required when the associated token was produced from the Client Credentials grant or with legacy bearer tokens on select endpoints. More information about [permissions](https://support.ironcladapp.com/hc/en-us/articles/23063233934999-Ironclad-Permissions-Overview).
      required: false
      schema:
        type: string
        example: 5f0375c4cdc1927a3c5edcd3
    RecordFilter:
      name: filter
      in: query
      description: "Filter records using a formula. The record property ID should be enclosed in brackets `[ ]` and the value should be enclosed in single quotes `' '`. \n\nRecord properties can be identified using the [Retrieve Records Schema](https://developer.ironcladapp.com/reference/list-all-records-metadata) endpoint.\n\nSupported formula operations include the following with documentation found [here](/reference/filter-query-param):\n\n<ul>\n <li>Equals / NotEqual</li>\n <li>Contains</li>\n <li>IsEmpty / IsNotEmpty</li>\n <li>LessThan / LessThanOrEqual</li>\n <li>GreaterThan / GreaterThanOrEqual</li>\n <li>Date / Today / RelativeDate</li>\n <li>And / Or</li>\n</ul>"
      schema:
        type: string
      example: Equals([counterpartyName], 'Test LLC')
    addressAsObject:
      name: addressAsObject
      in: query
      description: When true, returns addresses as objects instead of strings.
      schema:
        type: boolean
        default: false
    QueryPageNumber:
      name: page
      in: query
      description: The page number used when paginating through a list of results.
      schema:
        type: integer
        format: int32
        default: 0
        minimum: 0
        maximum: 100000000
    RecordLastUpdated:
      name: lastUpdated
      in: query
      description: Get records updated since (UTC)
      example: '2018-03-10T00:00:00.000Z'
      schema:
        type: string
    XAsUserEmail:
      name: x-as-user-email
      in: header
      description: Denotes the actor of the request. When used, the API will take into account this user's permissions and access. This or `x-as-user-id` is required when the associated token was produced from the Client Credentials grant or with legacy bearer tokens on select endpoints. More information about [permissions](https://support.ironcladapp.com/hc/en-us/articles/23063233934999-Ironclad-Permissions-Overview).
      required: false
      schema:
        type: string
        example: jane.doe@test.com
    HydrateEntitiesFlag:
      name: hydrateEntities
      in: query
      description: Indicates whether to fully hydrate related entities (true) or return minimal information (false).
      required: false
      schema:
        type: boolean
        default: false
x-readme:
  headers: []
  explorer-enabled: true
  proxy-enabled: true
  samples-languages:
  - curl
  - node
  - ruby
  - javascript
  - python
