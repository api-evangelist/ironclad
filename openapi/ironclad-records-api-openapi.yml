              type: string
              description: Duration remaining for the current status.
              example: P26D
            eventDate:
              type: string
              description: Date when the current contract status went into effect.
              example: '2024-07-02T00:00:00.000Z'
            message:
              type: string
              description: Human readable message regarding the contract status.
              example: Auto-renewing on Jul 2, 2024
        source:
