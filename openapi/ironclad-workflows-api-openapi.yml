                - type: object
                  properties:
                    code:
                      type: string
                      example: INVALID_PARAM
                    message:
                      type: string
                      example: invalid recipient type; *, signer, viewer are acceptable recipient types
                    param:
                      type: string
                      example: recipient.type
                - type: object
                  properties:
                    code:
                      type: string
                      enum:
                      - MISSING_PARAM
                    message:
                      type: string
                      example: missing required property 'recipient'
                    param:
                      type: string
                      example: recipient
        '401':
