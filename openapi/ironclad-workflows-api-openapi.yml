                  url:
                    type: string
                    description: The URL for the recipient to access the signature request.
                    example: https://na1.ironcladapp.com/sign?r=5e51f2b9-a684-4c50-887c-32911b661300&s=b2a303cd-f7a0-425e-8f36-d94e38c4e1a8
