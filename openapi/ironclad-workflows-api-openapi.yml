                                example: bobafett@example.com
                  approvals:
                    type: object
                    properties:
                      state:
                        type: string
                        example: in_progess
                      url:
                        type: string
                        example: https://na1.ironcladapp.com/public/api/v1/workflows/22e2ff72-56a1-4711-a4ca-41328d311e9f/approvals
                  signatures:
                    type: object
                    properties:
                      state:
                        type: string
