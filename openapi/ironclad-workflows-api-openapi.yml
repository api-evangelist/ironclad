components:
  schemas:
    SignStatusModel:
      title: Sign Status Model
      type: object
      properties:
        signers:
          type: array
          items:
            oneOf:
            - $ref: '#/components/schemas/SignStatusInternalSigner'
            - $ref: '#/components/schemas/SignStatusExternalSigner'
          description: All signers associated with the workflow.
        routing:
          type: string
          enum:
          - sequential
          - parallel
          example: sequential
          description: Indicates if routing is sequential (signatures collected in order) or parallel (all signers receive request simultaneously).
        status:
          type: string
          enum:
          - not_sent
          - sent
          - action_required
          - complete
          example: sent
          description: 'Indicates the status of the signature request. NOTE: If status is ''action_required,'' that means signature tags are missing for document.'
        requireSignedDocumentUpload:
          type: boolean
          example: false
          description: Indicates if the document requires a signed document to be uploaded.
        provider:
          type: string
          enum:
          - Ironclad Clickwrap
          - Ironclad Signature
          - Ironclad Signature (Legacy)
          - DocuSign
          - Adobe Sign
          - DropboxSign
          - Demo
          - None
          example: Ironclad Signature
          description: Indicates the signature provider used for the signature request, if any.
        scheduledSend:
          type: object
          properties:
            notifyAt:
              type: string
              format: date-time
              description: The ISO8601 timestamp for when the signature request is scheduled to be sent.
            reminder:
              type: object
              description: Reminder configuration, if set.
              properties:
                daysBefore:
                  type: integer
                  minimum: 1
                  maximum: 7
                  description: Number of days before the scheduled send when the reminder email will be sent.
                reminderDate:
                  type: string
                  format: date-time
                  description: The computed ISO8601 timestamp when the reminder email will be sent.
              required:
              - daysBefore
              - reminderDate
          required:
          - notifyAt
          description: Present when a signature request is scheduled. Only returned when status is not_sent.
    ParentRecordAttributeModel:
      type: object
      description: A parent record attribute value. Contains the record ID and readable ID of the parent record.
      properties:
        recordId:
          type: string
          description: The UUID of the parent record
          example: 50cc0690-d3b5-4a0e-a9c0-4e323e409430
        readableId:
          type: string
          description: The human-readable ID of the parent record
          example: IC-456
    WorkflowResponseModel:
      type: object
      description: The response from a successful workflow retrieval.
      additionalProperties: false
      properties:
        id:
          type: string
          example: 6013609108b8f070cee94fc1
        ironcladId:
          type: string
          example: IC-1
        title:
          type: string
          example: Consulting Agreement with Jane Doe
        template:
          type: string
          example: 600b296c3e15a234ab88f884
        step:
          type: string
          example: Review
        schema:
          type: object
          properties:
            counterpartyName:
              type: object
              properties:
                type:
                  type: string
                  example: string
                displayName:
                  type: string
                  example: Example String Attribute
                propertyKey:
                  description: The unique identifier for the property.
                  type: string
                  example: counterpartyName
                readOnly:
                  description: Determines whether the property's value can be updated.
                  type: boolean
                  example: true
            amount:
              type: object
              properties:
                type:
                  type: string
                  example: number
                displayName:
                  type: string
                  example: Example Number Attribute
                propertyKey:
                  description: The unique identifier for the property.
                  type: string
                  example: amount
                readOnly:
                  description: Determines whether the property's value can be updated.
                  type: boolean
                  example: false
            fee:
              type: object
              properties:
                type:
                  type: string
                  example: monetaryAmount
                displayName:
                  type: string
                  example: Example Monetary Amount Attribute
                propertyKey:
                  description: The unique identifier for the property.
                  type: string
                  example: fee
                readOnly:
                  description: Determines whether the property's value can be updated.
                  type: boolean
                  example: false
            draft:
              type: object
              properties:
                type:
                  type: string
                  example: array
                elementType:
                  type: object
                  properties:
                    type:
                      type: string
                      example: document
                    displayName:
                      type: string
                      example: Example Document Attribute
            lineItems:
              type: object
              properties:
                type:
                  type: string
                  example: array
                elementType:
                  type: object
                  properties:
                    type:
                      type: string
                      example: object
                    displayName:
                      type: string
                      example: Example Object Attribute
                    schema:
                      type: object
                      properties:
                        childAttribute:
                          type: object
                          properties:
                            type:
                              type: string
                              example: string
                            displayName:
                              $ref: '#/components/schemas/AttributeStringModel'
                        anotherChildAttribute:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                              - string
                            displayName:
                              $ref: '#/components/schemas/AttributeStringModel'
                        numberAttribute:
                          type: object
                          properties:
                            type:
                              type: string
                              enum:
                              - number
                            number:
                              $ref: '#/components/schemas/AttributeNumberModel'
        attributes:
          type: object
          properties:
            counterpartyName:
              type: string
              example: Boba Fett
            amount:
              type: integer
              example: 123
              default: 0
            fee:
              type: object
              properties:
                currency:
                  type: string
                  example: USD
                amount:
                  type: integer
                  example: 50000
                  default: 0
            draft:
              type: array
              items:
                $ref: '#/components/schemas/WorkflowDocumentModel'
            localLinkedRecord:
              $ref: '#/components/schemas/LinkedRecordAttributeModel'
            localParentRecord:
              $ref: '#/components/schemas/ParentRecordAttributeModel'
            localChildRecord:
              $ref: '#/components/schemas/ChildRecordAttributeModel'
        isCancelled:
          type: boolean
          example: false
          default: true
        isComplete:
          type: boolean
          example: false
          default: true
        status:
          type: string
          enum:
          - active
          - completed
