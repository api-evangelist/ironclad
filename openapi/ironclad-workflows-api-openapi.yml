  /workflows/{id}/signature-packet:
    patch:
      summary: Update Signature Packet on a Workflow
      description: "Update a workflow's signature packet by moving documents into it, moving documents out of it, or reordering documents within it. The request body specifies which workflow documents should be in the signature packet and their order. Documents in the request but not currently in the signature packet will be moved into it. Documents currently in the signature packet but not in the request will be moved out of it.\n\n**Note:** Only editable file types (.doc, .docx, .pdf) can be included in the signature packet.\n\n**Restrictions:**\n- Workflow must be at Review stage \n- All document keys must be valid editable documents on the workflow \n\n**OAuth Scope required:** `public.workflows.updateSignaturePacket`"
      operationId: update-workflow-signature-packet
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/WorkflowOrIroncladId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                signaturePacketDocumentKeys:
                  description: Array of document keys representing the desired signature packet order. Only editable file types (.doc, .docx, .pdf) are valid. Cannot be empty if the workflow has a sign step configured.
                  type: array
                  items:
                    type: string
                    description: Document key
              required:
              - signaturePacketDocumentKeys
      security:
      - sec0: []
        OAuth2:
        - public.workflows.updateSignaturePacket
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                required:
                - signaturePacketDocuments
                - excludedFromSignaturePacketDocuments
                properties:
                  signaturePacketDocuments:
                    description: The signature packet documents in the updated order.
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowDocumentModel'
                  excludedFromSignaturePacketDocuments:
                    description: The documents that are excluded from the signature packet.
                    type: array
                    items:
                      $ref: '#/components/schemas/WorkflowDocumentModel'
        '400':
          $ref: '#/components/responses/BadRequestError400'
        '401':
          $ref: '#/components/responses/UnauthorizedError401'
        '403':
          $ref: '#/components/responses/ForbiddenError403'
        '404':
          $ref: '#/components/responses/NotFoundError404'
      tags:
      - Workflows
  /workflows/{id}/documents/{attributeId}:
    post:
      summary: Create a Document on a Workflow
      description: 'Create a document in the specified workflow attribute. If a document key to an existing draft document is provided, the new file will be uploaded as a new version of the existing document. For all other non-draft documents and when document key is absent, this operation will only append the new document to the document attribute array. Please note that to upload a signed document, reference the [Create a Signed Document on a Workflow](https://developer.ironcladapp.com/reference/workflow-upload-signed-document) endpoint.


        **OAuth Scope required:** `public.workflows.createDocuments`'
      operationId: create-a-workflow-document
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/WorkflowId'
      - name: attributeId
        in: path
        description: The file attribute (e.g. "draft", "myFileField") - "document" type attributes can be found in the schema portion of the [Retrieve a Workflow](https://developer.ironcladapp.com/reference/retrieve-a-workflow) response.
        schema:
          type: string
        required: true
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - metadata
              - attachment
              properties:
                attachment:
                  type: string
                  format: binary
                  description: Must be a binary. Base64 is not accepted at this time.
                metadata:
                  type: object
                  description: A JSON string that contains all the metadata for the Document.
                  required:
                  - comment
                  properties:
                    comment:
                      $ref: '#/components/schemas/CommentModel'
                    key:
                      type: string
                      description: The unique identifier for the document. This key can be located using the [Retrieve a Workflow](https://developer.ironcladapp.com/reference/retrieve-a-workflow) endpoint. Should only be provided when creating a new version of an existing draft document. Versioning is not supported for non-draft documents.
            encoding:
              attachment:
                contentType: application/pdf, application/msword, application/vnd.openxmlformats-officedocument.wordprocessingml.document
              metadata:
                contentType: application/json
      security:
      - sec0: []
        OAuth2:
        - public.workflows.createDocuments
      responses:
        '204':
          description: '204'
          content:
            application/json:
              schema:
                type: object
                properties: {}
        '400':
          description: '400'
          content:
            application/json:
              schema:
                oneOf:
                - type: string
                  example: missing required form-data part 'attachment'
                - type: string
                  example: virus detected
        '404':
          description: '404'
          content:
            application/json:
              schema:
                oneOf:
                - type: string
                  example: Document does not exists
                - type: string
                  example: Workflow does not exists
      tags:
      - Workflows
  /workflows/{id}/document/{key}/download:
