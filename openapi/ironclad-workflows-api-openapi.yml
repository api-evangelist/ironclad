                      enum:
                      - MISSING_PARAM
                    message:
                      type: string
                      example: missing required property 'frameAncestor'
                    param:
                      type: string
                      example: frameAncestor
        '401':
          $ref: '#/components/responses/UnauthorizedError401'
        '403':
          description: '403'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                    enum:
                    - FORBIDDEN
                  message:
                    type: string
                    example: user is not authorized to create signature request URL for signature request, please try again later
        '404':
          $ref: '#/components/responses/WorkflowNotFoundResponse404'
        '429':
          description: '429'
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
