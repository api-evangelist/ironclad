                  example: Counterparty Signer
                frameAncestor:
                  description: The hostname of the parent frame that the recipient URL can be embedded in. Can optionally include a URL scheme and/or port number. Wildcards (i.e. '*') are not allowed.
                  type: string
                  example: https://example.com
                allowMultipleUsages:
                  description: Whether or not the embeddable recipient URL can be used multiple times before it expires. Defaults to false if not set.
