      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/WorkflowOrIroncladId'
      requestBody:
        content:
          application/json:
            schema:
              oneOf:
              - type: object
                required:
                - type
                - roleName
                properties:
                  type:
                    type: string
                    enum:
                    - signer
                    description: The type of recipient.
                  roleName:
                    type: string
                    description: The role name of the signer. A full list of role names can be located using the [List All Workflow Signers](https://developer.ironcladapp.com/reference/list-all-workflow-signers) endpoint.
                    example: Counterparty Signer
              - type: object
                required:
                - type
                - email
                properties:
                  type:
                    type: string
                    enum:
                    - viewer
                    description: The type of recipient.
                  email:
                    type: string
                    description: The email address of the CC recipient.
      security:
      - sec0: []
        OAuth2:
