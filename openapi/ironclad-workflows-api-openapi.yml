  /workflows/{id}/upload-signed:
    post:
      summary: Create a Signed Document on a Workflow
      description: "Upload a fully or partially signed document to a specified workflow that is in sign step. \n\n**OAuth Scope required:** `public.workflows.uploadSignedDocuments`"
      operationId: workflow-upload-signed-document
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/WorkflowId'
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              required:
              - attachment
              properties:
                attachment:
                  type: object
                  format: binary
                  description: Must be a binary. Base64 is not accepted at this time.
                metadata:
                  type: object
                  description: A JSON string containing metadata for the document. The `signerRoleNames` field must be nested inside this object. If `metadata` is omitted entirely, the uploaded document is treated as fully signed and the workflow will complete the sign step.
                  properties:
                    signerRoleNames:
                      type: array
                      description: Specifies which signers have already signed on the document when the document does not contain all required signatures. This field must be provided inside the `metadata` object. If `signerRoleNames` is omitted or empty — either by excluding it from `metadata` or by omitting `metadata` altogether — the document is assumed to be fully signed and the workflow will complete the sign step.
                      items:
                        type: string
                        example: Counterparty Signer
                        description: The role name of the signers. A full list of role names can be located using the [List All Workflow Signers](https://developer.ironcladapp.com/reference/list-all-workflow-signers) endpoint.
            encoding:
              attachment:
                contentType: application/pdf
              metadata:
                contentType: application/json
      security:
      - sec0: []
        OAuth2:
        - public.workflows.uploadSignedDocuments
      responses:
        '200':
          $ref: '#/components/responses/SignedDocumentResponse200'
        '400':
          description: '400'
          content:
            application/json:
              schema:
                oneOf:
                - type: object
                  properties:
                    code:
                      type: string
                      enum:
                      - MISSING_PARAM
                    param:
                      type: string
                      example: attachments
                    message:
                      type: string
                      example: missing required form-data part 'attachment'
                - type: object
                  properties:
                    data:
                      type: object
                      properties:
                        code:
                          type: string
                          enum:
                          - VIRUS_DETECTED
                        files:
                          type: array
                          items:
                            type: string
                            example: sample-eicar-file.pdf
                        message:
                          type: string
                          example: Detected virus in one or more of the files received.
                - $ref: '#/components/schemas/NotOnSignStep400'
                - type: object
                  properties:
                    code:
                      type: string
                      example: INVALID_PARAM
                    message:
                      type: string
                      example: The signer field contains invalid signers, please check.
        '404':
          description: '404'
          content:
            application/json:
              schema:
                oneOf:
                - $ref: '#/components/schemas/WorkflowNotFound'
      tags:
      - Workflows
