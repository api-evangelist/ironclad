  /workflows/{id}/attributes:
    patch:
      summary: Update Workflow Metadata
      description: 'The workflow must be in the Review step in order for its data to be updated. Use the `remove` action to clear field values and the `set` action to add or modify values. Form validation is enforced; required fields cannot be removed and any required fields triggered by conditions must be populated.


        **Note:** This endpoint does not support updating document/file type attributes. To manage documents, use the [Create a Document on a Workflow](https://developer.ironcladapp.com/reference/create-a-workflow-document) and [Update Signature Packet on a Workflow](https://developer.ironcladapp.com/reference/update-workflow-signature-packet) endpoints.


        **OAuth Scope required:** `public.workflows.updateWorkflows`'
      operationId: update-workflow-metadata
      parameters:
      - $ref: '#/components/parameters/XAsUserEmail'
      - $ref: '#/components/parameters/XAsUserId'
      - $ref: '#/components/parameters/WorkflowOrIroncladId'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                updates:
                  type: array
                  items:
                    type: object
                    properties:
                      action:
                        type: string
                        enum:
                        - set
                        - remove
                        description: The type of action you'd like to take on an existing attribute (read-only fields cannot be updated). Use the remove action to clear values. If using the remove action, the attribute cannot be required by the workflow.
                        default: set
                      path:
                        type: string
                        description: The workflow attribute id that you'd like to make a change to. Workflow attribute IDs and values can be retrieved using the [Retrieve a Workflow](https://developer.ironcladapp.com/reference/retrieve-a-workflow) endpoint.
                        example: counterpartyName
                      value:
                        type: string
                        description: The value to change the attribute to. Only required when the `action` property is `set` and not `remove`. The value's format must conform to the field type (e.g., `"someString"` for strings, `true` or `false` for booleans, etc.
                        example: Example Company
                    required:
                    - action
                    - path
                comment:
                  type: string
                  description: A comment that explains the updates you are making to the workflow.
                  example: Changing attribute on a Workflow.
              required:
              - updates
      security:
      - sec0: []
        OAuth2:
        - public.workflows.updateWorkflows
      responses:
        '200':
          description: '200'
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    example: 6013609108b8f070cee94fc1
                  ironcladId:
                    type: string
                    example: IC-1
                  title:
                    type: string
                    example: Consulting Agreement with Jane Doe
                  template:
                    type: string
                    example: 600b296c3e15a234ab88f884
                  step:
                    type: string
                    example: Review
                  schema:
                    type: object
                    properties:
                      counterpartyName:
                        type: object
                        properties:
                          type:
                            type: string
                            example: string
                          displayName:
                            type: string
                            example: Example String Attribute
                          propertyKey:
                            description: The unique identifier for the property.
                            type: string
                            example: counterpartyName
                          readOnly:
                            description: Determines whether the property's value can be updated.
                            type: boolean
                            example: true
                      amount:
                        type: object
                        properties:
                          type:
                            type: string
                            example: number
                          displayName:
                            type: string
                            example: Example Number Attribute
                          propertyKey:
                            description: The unique identifier for the property.
                            type: string
                            example: amount
                          readOnly:
                            description: Determines whether the property's value can be updated.
                            type: boolean
                            example: false
                      fee:
                        type: object
                        properties:
                          type:
                            type: string
                            example: monetaryAmount
                          displayName:
                            type: string
                            example: Example Monetary Amount Attribute
                          propertyKey:
                            description: The unique identifier for the property.
                            type: string
                            example: fee
                          readOnly:
                            description: Determines whether the property's value can be updated.
                            type: boolean
                            example: false
                      draft:
                        type: object
                        properties:
                          type:
                            type: string
                            example: array
                          elementType:
                            type: object
                            properties:
                              type:
                                type: string
                                example: document
                              displayName:
                                type: string
                                example: Example Document Attribute
                      lineItems:
                        type: object
                        properties:
                          type:
                            type: string
                            example: array
                          elementType:
                            type: object
                            properties:
                              type:
                                type: string
                                example: object
                              displayName:
                                type: string
                                example: Example Object Attribute
                              schema:
                                type: object
                                properties:
                                  childAttribute:
                                    type: object
                                    properties:
                                      type:
                                        type: string
                                        example: string
                                      displayName:
                                        type: string
                                        example: Example String Attribute
                                  anotherChildAttribute:
                                    type: object
                                    properties:
                                      type:
                                        type: string
                                        example: string
                                      displayName:
                                        type: string
                                        example: Example String Attribute
                  attributes:
                    type: object
                    properties:
                      counterpartyName:
                        type: string
                        example: Boba Fett
                      amount:
                        type: integer
                        example: 123
                        default: 0
                      fee:
                        type: object
                        properties:
                          currency:
                            type: string
                            example: USD
                          amount:
                            type: integer
                            example: 50000
                            default: 0
                      draft:
                        type: array
                        items:
                          type: object
                          properties:
                            version:
                              type: string
                              example: B1QePArXb
                            filename:
                              type: string
                              example: file.pdf
                            download:
                              type: string
                              example: /public/api/v1/workflows/594356b9fbcd7f74006fdf8a/document/rJklwCHQ/download
                  isCancelled:
                    type: boolean
                    example: false
                    default: true
                  isComplete:
                    type: boolean
                    example: false
                    default: true
